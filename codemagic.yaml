workflows:
  ios-alnoorway-auto:
    name: AlNoorway iOS Full Build & Publish
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: noourway
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.osama.ostazy
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_ID: "6759056432"
      node: latest
      xcode: latest
    scripts:
      - name: Force Downgrade & Install
        script: |
          npm install @capacitor/core@7.6.2 @capacitor/ios@7.6.2 @capacitor/cli@7.6.2 @capacitor/android@7.0.0 --save-exact
          npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Reset & Sync Capacitor
        script: |
          export CAPACITOR_PROJECT_USE_SPM=true
          npx cap sync ios

      - name: Generate Assets
        script: npx @capacitor/assets generate --ios

      - name: Build for Simulator (Appetize)
        script: |
          # بناء نسخة مخصصة للمحاكي (Simulator)
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # استخراج ملف الـ .app وضغطه بطريقة تضمن وجوده في الـ Artifacts
          mkdir -p appetize_build
          APP_PATH=$(find derived_data/Build/Products -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            # ضغط المجلد مباشرة في المكان الرئيسي
            zip -r appetize_bundle.zip "$APP_PATH"
          else
            echo "Error: .app file not found!"
            exit 1
          fi

      - name: Increment Build Number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build IPA for App Store
        script: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>AU27C9M3JX</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild clean \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath derived_data

          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/App.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=AU27C9M3JX \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            -allowProvisioningUpdates

          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Publish to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH" --apple-id "$APP_ID"
          else
            echo "IPA not found, skipping publish"
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - "*.zip" # هذا سيجلب أي ملف zip يتم إنشاؤه في المجلد الرئيسي
    publishing:
      email:
        recipients:
          - ahmedmustafa0384@gmail.com
